spring.application.name=demoCarpultec

# Configuración del Servidor e Infraestructura (Crítico para AWS)
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Configuración de Negocio y Geolocalización (Carpool UTEC)
app.utec.latitude=-12.068335
app.utec.longitude=-77.080902
app.google-maps.api-key=${GOOGLE_MAPS_API_KEY:}
app.google-maps.base-url=${GOOGLE_MAPS_BASE_URL:https://maps.googleapis.com/maps/api}

# Configuración de Notificaciones por Correo
app.mail.from=${APP_MAIL_FROM:no-reply@carpoolutec.local}

# Seguridad, Tokens de Acceso y JWT
app.jwt.secret=${APP_JWT_SECRET:Q2hhbmdlVGhpc0RlZmF1bHRTZWNyZXRLZXlGb3JKV1RTaWduaW5nU2xpY2Uy}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

# Configuración de CORS para el Frontend
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Actuator — expone /actuator/health para ALB health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never